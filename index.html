<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>AR project template</title>
    <script src="js/three.js"></script>
    <script src="js/tween.umd.js"></script>
    <script src="loaders/GLTFLoader.js"></script>
    <script src="loaders/GLTF2Loader.js"></script>
    <script src="loaders/MTLLoader.js"></script>
    <script src="loaders/OBJLoader.js"></script>
    <script src="jsartoolkit5/artoolkit.min.js"></script>
    <script src="jsartoolkit5/artoolkit.api.js"></script>
    <script src="threex/threex-artoolkitsource.js"></script>
    <script src="threex/threex-artoolkitcontext.js"></script>
    <script src="threex/threex-arbasecontrols.js"></script>
    <script src="threex/threex-armarkercontrols.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: Monospace; user-select: none; pointer-events: none; }
        #access { top: 0; left: 0; right: 0; bottom: 0; background: #000; position: absolute; pointer-events: all; cursor: pointer; }
        #text-wrapper { top: 50%; left: 50%; position: absolute; color: #fff; transform: translate(-50%, -50%); text-align: center; text-transform: uppercase; font-family: Arial, Helvetica, sans-serif; font-weight: 400; line-height: 1.5em; font-size: large; white-space: nowrap; pointer-events: none; }
        #loader { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #fff; pointer-events: none; transition: opacity .2s linear; display: none; }
        .spinner-wrapper { left: 50%; top: 50%; position: absolute; transform: translate(-50%, -50%); text-align: center; width: 130px; height: 165px; font-family: Arial, Helvetica, sans-serif; font-weight: 400; line-height: 1.5em; font-size: large; }
        .spinner-wrapper img { width: 130px; height: 130px; pointer-events: none; }
    </style>
</head>

<body>
    <div id="access">
        <div id="text-wrapper">
            Натисніть на екран<br>для отримання доступу до WebAR-буклету «Леонардо»
        </div>
    </div>

    <div id="loader">
        <div class="spinner-wrapper">
            <img src="data/spin.gif" alt="spin gif"><br>Loading...
        </div>
    </div>

    <script>
        const accessScreen = document.getElementById('access');
        const loaderScreen = document.getElementById('loader');

        function initiateExperience() {
            let scene, camera, renderer, clock, deltaTime, totalTime;
            let arToolkitSource, arToolkitContext;
            let mainContainer;
            let contentInitialized = false;
            
            // Единая конфигурация маркеров (вместо кучи массивов)
            const markersConfig = [
                {
                    type: 'pattern',
                    patternUrl: 'data/pattern-gear.patt',
                    mode: 'image',
                    fileUrl: '1_student.jpg',
                    audioUrl: '1_student.mp3.mp3'
                },
                {
                    type: 'barcode',
                    barcodeValue: 2,
                    mode: 'image',
                    fileUrl: '1_author.jpg',
                    audioUrl: '2_author.mp3.mp3'
                },
                {
                    type: 'barcode',
                    barcodeValue: 3,
                    mode: 'image',
                    fileUrl: '3_machine.jpg',
                    audioUrl: '3_machine.mp3.mp3'
                }
            ];

            const activeMarkers = []; // Хранилище созданных маркеров для апдейта
            const contentPromises = [];

            initThreeJS();
            initAR();
            setupMarkers();
            
            Promise.all(contentPromises).then(() => {
                contentInitialized = true;
                loaderScreen.style.opacity = '0';
                setTimeout(() => loaderScreen.style.display = 'none', 200);
            }).catch(err => {
                console.error("Помилка завантаження контенту:", err);
                contentInitialized = true;
                loaderScreen.style.opacity = '0';
            });

            animate();

            function initThreeJS() {
                scene = new THREE.Scene();
                scene.add(new THREE.AmbientLight(0xffffff, 0.75));

                camera = new THREE.Camera();
                scene.add(camera);

                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setClearColor(new THREE.Color('lightgrey'), 0);
                renderer.setSize(640, 480);
                renderer.domElement.style.position = 'absolute';
                renderer.domElement.style.top = '0px';
                renderer.domElement.style.left = '0px';
                document.body.appendChild(renderer.domElement);

                clock = new THREE.Clock();
                totalTime = 0;
                mainContainer = new THREE.Group();
                scene.add(mainContainer);
            }

            function initAR() {
                arToolkitSource = new THREEx.ArToolkitSource({ sourceType: 'webcam' });

                function onResize() {
                    arToolkitSource.onResize();
                    arToolkitSource.copySizeTo(renderer.domElement);
                    if (arToolkitContext.arController !== null) {
                        arToolkitSource.copySizeTo(arToolkitContext.arController.canvas);
                    }
                }

                arToolkitSource.init(() => onResize());
                window.addEventListener('resize', onResize);

                arToolkitContext = new THREEx.ArToolkitContext({
                    cameraParametersUrl: 'data/camera_para.dat',
                    detectionMode: 'mono_and_matrix',
                    matrixCodeType: "3x3",
                    maxDetectionRate: 60,
                    canvasWidth: 640,
                    canvasHeight: 480
                });

                arToolkitContext.init(() => {
                    camera.projectionMatrix.copy(arToolkitContext.getProjectionMatrix());
                });
            }

            function setupMarkers() {
                const listener = new THREE.AudioListener();
                camera.add(listener);
                const audioLoader = new THREE.AudioLoader();
                const textureLoader = new THREE.TextureLoader();
                const gltfLoader = typeof THREE.GLTF2Loader !== 'undefined' ? new THREE.GLTF2Loader() : null;

                markersConfig.forEach(config => {
                    let markerRoot = new THREE.Group();
                    mainContainer.add(markerRoot);

                    // Настройка контроллера маркера
                    let markerParams = config.type === 'pattern' 
                        ? { type: 'pattern', patternUrl: config.patternUrl, size: 1 } // Упростил расчет размера, если нужен offset - верни
                        : { type: 'barcode', barcodeValue: config.barcodeValue };
                        
                    let controls = new THREEx.ArMarkerControls(arToolkitContext, markerRoot, markerParams);
                    
                    let markerData = { root: markerRoot, controls: controls, sound: null };

                    // Загрузка контента (Изображение или Модель)
                    if (config.fileUrl) {
                        contentPromises.push(new Promise((resolve, reject) => {
                            if (config.mode === 'image') {
                                textureLoader.load(config.fileUrl, texture => {
                                    let ratio = texture.image.naturalWidth / texture.image.naturalHeight;
                                    // PlaneBufferGeometry устарела, используем PlaneGeometry
                                    let geometry = texture.image.naturalHeight < texture.image.naturalWidth 
                                        ? new THREE.PlaneGeometry(ratio, 1) 
                                        : new THREE.PlaneGeometry(1, 1 / ratio);
                                    let material = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide });
                                    let mesh = new THREE.Mesh(geometry, material);
                                    mesh.rotation.x = -Math.PI / 2;
                                    markerRoot.add(mesh);
                                    resolve();
                                }, undefined, reject);
                            } else if (config.mode === 'model' && gltfLoader) {
                                gltfLoader.load(config.fileUrl, response => {
                                    const object = response.scene.children[0];
                                    object.scale.set(0.01, 0.01, 0.01);
                                    markerRoot.add(object);
                                    resolve();
                                }, undefined, reject);
                            } else {
                                resolve(); // Если режим неизвестен или пуст
                            }
                        }));
                    }

                    // Загрузка аудио
                    if (config.audioUrl) {
                        contentPromises.push(new Promise((resolve) => {
                            audioLoader.load(config.audioUrl, buffer => {
                                let sound = new THREE.Audio(listener);
                                sound.setBuffer(buffer);
                                markerData.sound = sound;
                                resolve();
                            }, undefined, err => {
                                console.warn(`Помилка завантаження аудіо ${config.audioUrl}:`, err);
                                resolve(); // Разрешаем промис даже при ошибке, чтобы экран загрузки пропал
                            });
                        }));
                    }

                    activeMarkers.push(markerData);
                });
            }

            function update() {
                if (!arToolkitSource.ready || !contentInitialized) return;
                
                arToolkitContext.update(arToolkitSource.domElement);

                // Оптимизированная проверка видимости маркеров
                activeMarkers.forEach(marker => {
                    let isVisible = marker.root.visible; // THREEx переключает видимость root объекта автоматически
                    let sound = marker.sound;

                    if (sound) {
                        if (isVisible && !sound.isPlaying) {
                            sound.play();
                        } else if (!isVisible && sound.isPlaying) {
                            sound.pause(); // Лучше пауза, чем стоп, чтобы не начинать сначала (на твоё усмотрение)
                        }
                    }
                });
            }

            function animate() {
                requestAnimationFrame(animate);
                deltaTime = clock.getDelta();
                totalTime += deltaTime;
                update();
                renderer.render(scene, camera);
            }
        }

        accessScreen.addEventListener('click', () => {
            document.body.removeChild(accessScreen);
            loaderScreen.style.display = 'block';
            initiateExperience();
        });
    </script>
</body>
</html>
